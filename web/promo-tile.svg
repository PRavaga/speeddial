<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b10"/>
      <stop offset="100%" stop-color="#07080a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(91,159,255,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" rx="0" fill="url(#bg)"/>
  <rect width="440" height="280" fill="url(#glow)"/>

  <!-- Logo: 2x2 grid -->
  <g transform="translate(184, 60)">
    <rect x="0" y="0" width="28" height="28" rx="6" fill="#5b9fff"/>
    <rect x="34" y="0" width="28" height="28" rx="6" fill="#5b9fff" opacity="0.4"/>
    <rect x="0" y="34" width="28" height="28" rx="6" fill="#5b9fff" opacity="0.4"/>
    <rect x="34" y="34" width="28" height="28" rx="6" fill="#5b9fff" opacity="0.25"/>
  </g>

  <!-- Text -->
  <text x="220" y="175" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#e8eaf2" letter-spacing="-0.5">Speed Dial</text>
  <text x="220" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#838698">Tab command center for Chrome &amp; Edge</text>

  <!-- Subtle bottom line -->
  <rect x="170" y="230" width="100" height="1.5" rx="0.75" fill="#5b9fff" opacity="0.3"/>
</svg>
