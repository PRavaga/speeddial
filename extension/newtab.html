<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Tab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 12l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search" placeholder="Search tabs..." autocomplete="off" spellcheck="false">
        <kbd class="search-kbd">/</kbd>
      </div>
      <div class="topbar-right">
        <div class="stats" id="stats"></div>
        <div class="backup-indicator">
          <button class="backup-btn" id="backup-btn" title="Save snapshot (Ctrl+Shift+B)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M13 5.5V13a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1h6.5L13 5.5z" stroke="currentColor" stroke-width="1.2"/>
              <path d="M5 8h6M5 10.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="backup-time" id="backup-time"></span>
        </div>
      </div>
    </header>

    <nav class="group-tabs" id="group-tabs"></nav>

    <main class="tile-grid" id="tile-grid">
      <div class="loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </main>

    <section class="sessions-panel">
      <button class="sessions-toggle" id="sessions-toggle">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 4h10M2 7h10M2 10h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Saved Sessions
        <span class="sessions-count" id="sessions-count">0</span>
      </button>
      <div class="sessions-list" id="sessions-list"></div>
    </section>
  </div>

  <div class="grain" aria-hidden="true"></div>
  <script src="newtab.js"></script>
</body>
</html>
