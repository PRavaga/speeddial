<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Dial</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon.png">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="search-wrap">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 12l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search" placeholder="Search tabs..." autocomplete="off" spellcheck="false">
        <kbd class="search-kbd">/</kbd>
      </div>
      <div class="topbar-right">
        <div class="stats" id="stats"></div>
        <div class="backup-indicator">
          <button class="backup-btn" id="backup-btn" title="Save snapshot (Ctrl+Shift+B)">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M13 5.5V13a1 1 0 01-1 1H4a1 1 0 01-1-1V3a1 1 0 011-1h6.5L13 5.5z" stroke="currentColor" stroke-width="1.2"/>
              <path d="M5 8h6M5 10.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </button>
          <span class="backup-time" id="backup-time"></span>
        </div>
        <div class="settings-wrap">
          <button class="settings-btn" id="settings-btn" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
          <div class="settings-dropdown" id="settings-dropdown">
            <div class="settings-heading">Appearance</div>
            <div class="settings-row">
              <div>
                <div class="settings-label">Light theme</div>
                <div class="settings-sublabel">Switch to light colors</div>
              </div>
              <label class="toggle">
                <input type="checkbox" id="theme-toggle">
                <span class="toggle-track"></span>
              </label>
            </div>

            <div class="settings-divider"></div>
            <div class="settings-heading">Sync</div>

            <!-- Signed out state -->
            <div class="settings-row sync-signed-out" id="sync-signed-out">
              <div>
                <div class="settings-label">Cloud sync</div>
                <div class="settings-sublabel">Sign in to sync across browsers</div>
              </div>
              <button class="google-signin-btn" id="google-signin-btn">
                <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59A14.5 14.5 0 019.5 24c0-1.59.28-3.14.76-4.59l-7.98-6.19A23.99 23.99 0 000 24c0 3.77.9 7.35 2.56 10.52l7.97-5.93z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 5.93C6.51 42.62 14.62 48 24 48z"/></svg>
                Sign in
              </button>
            </div>

            <!-- Signed in state -->
            <div class="settings-row sync-signed-in" id="sync-signed-in" style="display:none">
              <div class="sync-account">
                <img class="sync-avatar" id="sync-avatar" src="" alt="">
                <div>
                  <div class="settings-label" id="sync-email"></div>
                  <div class="settings-sublabel" id="sync-status-text">Not synced yet</div>
                </div>
              </div>
              <div class="sync-actions">
                <button class="sync-now-btn" id="sync-now-btn" title="Sync now">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M1.5 7a5.5 5.5 0 019.37-3.9M12.5 7a5.5 5.5 0 01-9.37 3.9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    <path d="M11 1v3h-3M3 13v-3h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <button class="sync-signout-btn" id="sync-signout-btn" title="Sign out">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M5 2H3a1 1 0 00-1 1v8a1 1 0 001 1h2M9 10l3-3-3-3M5.5 7H12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <nav class="group-tabs" id="group-tabs"></nav>

    <main class="tile-grid" id="tile-grid">
      <div class="loading">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </main>

    <section class="sessions-panel">
      <button class="sessions-toggle" id="sessions-toggle">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 4h10M2 7h10M2 10h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
        Saved Sessions
        <span class="sessions-count" id="sessions-count">0</span>
      </button>
      <div class="sessions-list" id="sessions-list"></div>
    </section>
  </div>

  <div class="grain" aria-hidden="true"></div>
  <script type="module" src="newtab.js"></script>
</body>
</html>
