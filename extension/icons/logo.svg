<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#141720"/>
      <stop offset="100%" stop-color="#0d0f14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6babff"/>
      <stop offset="100%" stop-color="#4a8ff0"/>
    </linearGradient>
  </defs>
  <!-- Outer rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <!-- 2x2 tile grid -->
  <!-- Top-left: accent tile (active) -->
  <rect x="18" y="18" width="40" height="40" rx="10" fill="url(#accent)"/>
  <!-- Top-right: dim tile -->
  <rect x="70" y="18" width="40" height="40" rx="10" fill="#252938" opacity="0.9"/>
  <!-- Bottom-left: dim tile -->
  <rect x="18" y="70" width="40" height="40" rx="10" fill="#252938" opacity="0.9"/>
  <!-- Bottom-right: dim tile -->
  <rect x="70" y="70" width="40" height="40" rx="10" fill="#252938" opacity="0.9"/>
  <!-- Subtle glow on accent tile -->
  <rect x="18" y="18" width="40" height="40" rx="10" fill="url(#accent)" opacity="0.15" filter="blur(6px)"/>
  <!-- Small dots in dim tiles to suggest content -->
  <circle cx="90" cy="33" r="3.5" fill="#4c4f62"/>
  <circle cx="90" cy="85" r="3.5" fill="#4c4f62"/>
  <circle cx="38" cy="85" r="3.5" fill="#4c4f62"/>
  <!-- Lines in dim tiles -->
  <rect x="77" y="44" width="18" height="2.5" rx="1.25" fill="#3a3d50"/>
  <rect x="77" y="96" width="18" height="2.5" rx="1.25" fill="#3a3d50"/>
  <rect x="25" y="96" width="18" height="2.5" rx="1.25" fill="#3a3d50"/>
  <!-- Accent tile icon: small grid/dial symbol -->
  <rect x="29" y="29" width="7" height="7" rx="1.5" fill="white" opacity="0.9"/>
  <rect x="40" y="29" width="7" height="7" rx="1.5" fill="white" opacity="0.5"/>
  <rect x="29" y="40" width="7" height="7" rx="1.5" fill="white" opacity="0.5"/>
  <rect x="40" y="40" width="7" height="7" rx="1.5" fill="white" opacity="0.3"/>
</svg>
